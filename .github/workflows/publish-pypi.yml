name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "release-*"
      - "[0-9]*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Validate tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            v*) tag_version="${tag#v}" ;;
            release-*) tag_version="${tag#release-}" ;;
            *) tag_version="$tag" ;;
          esac
          pkg_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject_file:
              pyproject = tomllib.load(pyproject_file)

          print(pyproject.get("project", {}).get("version", ""))
          PY
          )"
          if [ -z "$pkg_version" ]; then
            echo "Could not resolve package version from pyproject.toml"
            exit 1
          fi
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag/version mismatch: tag=$tag_version package=$pkg_version"
            exit 1
          fi
          echo "Tag/version check passed: $tag_version"

      - name: Validate source module entrypoint version
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e .
          pkg_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as pyproject_file:
              pyproject = tomllib.load(pyproject_file)

          print(pyproject.get("project", {}).get("version", ""))
          PY
          )"
          module_version="$(PYTHONPATH=src python -m phart --version)"
          if [ "$module_version" != "$pkg_version" ]; then
            echo "Module entrypoint/version mismatch: module=$module_version package=$pkg_version"
            exit 1
          fi
          echo "Source module entrypoint check passed: $module_version"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          twine check dist/*

      - name: Validate distribution metadata version
        run: |
          set -euo pipefail
          python - <<'PY'
          import tarfile
          import tomllib
          from email.parser import Parser
          from pathlib import Path
          from zipfile import ZipFile

          with open("pyproject.toml", "rb") as pyproject_file:
              expected = tomllib.load(pyproject_file)["project"]["version"]

          versions = {}

          for wheel in Path("dist").glob("*.whl"):
              with ZipFile(wheel) as archive:
                  metadata_name = next(
                      name
                      for name in archive.namelist()
                      if name.endswith(".dist-info/METADATA")
                  )
                  metadata = Parser().parsestr(
                      archive.read(metadata_name).decode("utf-8")
                  )
              versions[wheel.name] = metadata["Version"]

          for sdist in Path("dist").glob("*.tar.gz"):
              with tarfile.open(sdist, "r:gz") as archive:
                  pkg_info_name = next(
                      name
                      for name in archive.getnames()
                      if name.endswith("/PKG-INFO")
                  )
                  pkg_info = archive.extractfile(pkg_info_name)
                  if pkg_info is None:
                      raise RuntimeError(f"Could not read {pkg_info_name}")
                  metadata = Parser().parsestr(pkg_info.read().decode("utf-8"))
              versions[sdist.name] = metadata["Version"]

          if not versions:
              raise RuntimeError("No distributions found in dist/")

          mismatches = {
              name: version
              for name, version in versions.items()
              if version != expected
          }
          if mismatches:
              details = ", ".join(
                  f"{name}={version}" for name, version in sorted(mismatches.items())
              )
              raise SystemExit(
                  f"Distribution metadata/version mismatch: expected={expected}; {details}"
              )

          print(f"Distribution metadata check passed: {expected}")
          PY

      - name: Upload dist artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Twine Token)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
    permissions:
      contents: read

    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Download dist artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: dist
          path: dist/

      - name: Validate upload token is configured
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PHART_PYPI_API_TOKEN: ${{ secrets.PHART_PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN}" ] && [ -z "${PYPI_TOKEN}" ] && [ -z "${PHART_PYPI_API_TOKEN}" ]; then
            echo "Missing PyPI token secret."
            echo "Configure one of: PYPI_API_TOKEN, PYPI_TOKEN, or PHART_PYPI_API_TOKEN."
            exit 1
          fi

      - name: Publish package to PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
          PHART_PYPI_API_TOKEN: ${{ secrets.PHART_PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          TWINE_PASSWORD="${PYPI_API_TOKEN:-${PYPI_TOKEN:-${PHART_PYPI_API_TOKEN:-}}}"
          export TWINE_USERNAME="__token__"
          export TWINE_PASSWORD
          python -m pip install --upgrade pip twine
          python -m twine upload dist/*
