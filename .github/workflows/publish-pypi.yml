name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
      - "release-*"
      - "[0-9]*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Validate tag matches package version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            v*) tag_version="${tag#v}" ;;
            release-*) tag_version="${tag#release-}" ;;
            *) tag_version="$tag" ;;
          esac
          pkg_version="$(python -c "import re, pathlib; s=pathlib.Path('src/phart/__init__.py').read_text(encoding='utf-8'); m=re.search(r'__version__\\s*=\\s*\\\"([^\\\"]+)\\\"', s); print(m.group(1) if m else '')")"
          if [ -z "$pkg_version" ]; then
            echo "Could not resolve package version from src/phart/__init__.py"
            exit 1
          fi
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag/version mismatch: tag=$tag_version package=$pkg_version"
            exit 1
          fi
          echo "Tag/version check passed: $tag_version"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
